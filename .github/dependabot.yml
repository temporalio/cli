version: 2
updates:
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    allow:
      - dependency-type: direct
    ignore:
      # Temporal dependencies are managed manually to ensure coordinated upgrades across all temporal packages
      - dependency-name: "go.temporal.io/*"
      - dependency-name: "github.com/temporalio/ui-server/v2"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 14
    groups:
      github-actions:
        patterns:
          - "*"
